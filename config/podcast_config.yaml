# podcastfy ConversationConfig — script-writing is OFF; we pass a transcript
# directly. These values control voice rendering and (for two_host mode) the
# personas the TTS attaches to <Person1>/<Person2> tags.

word_count: 4000
conversation_style:
  - educational
  - technical
  - intuitive
  - voice-first

roles_person1: "Research mentor — PhD friend who connects fields, intuition first, geometric analogies"
roles_person2: "Curious technical interlocutor — asks the right deep questions, not filler"

dialogue_structure:
  - hook
  - context
  - key_idea
  - math_intuition
  - results
  - bigger_picture
  - discussion

text_to_speech:
  default_tts_model: "elevenlabs"
  elevenlabs:
    default_voices:
      question: "Chris"     # Person2 — interlocutor
      answer:   "Liv"       # Person1 — mentor
    model: "eleven_turbo_v2_5"
  openai:
    default_voices:
      question: "echo"
      answer:   "shimmer"
    model: "tts-1-hd"

output_language: "English"
engagement_techniques:
  - rhetorical questions
  - concrete analogies
  - explicit "this part is genuinely subtle" honesty
creativity: 0.4
